name: Refresh Today's Weird Thing

# The homepage's "🔍 Today's Weird Thing" card rotates every few hours
# client-side; this keeps the POOL it rotates through genuinely current.
# Cheap by design: `--only=weird` is one small research call + one structured
# call (cents/run). Failure is safe — validation writes nothing, so the
# previous pool keeps rotating. Cadence is the cost lever.
#
# NOTE on "I deployed but don't see the change": after this commits + triggers
# deploy.yml, GitHub Pages serves index.html with Cache-Control: max-age=600,
# and Safari caches HTML harder still — so the live page can show the OLD
# hashed bundle (old content) for ~10+ min. Hard-refresh (Cmd+Shift+R) or wait.
# Also: the card is (day, block)-seeded over the pool, so a fresh pool changes
# what the rotation surfaces over the day, not necessarily your current slot
# the instant you redeploy.
on:
  schedule:
    # Every other day at 06:00 UTC. One run yields ~14 fresh items, and the card
    # cycles the whole pool with no repeats before it turns over — so a daily (let
    # alone twice-daily) refresh replaced the pool faster than a visitor could see
    # it. (`*/2` is day-of-month, so the gap shortens slightly across month ends —
    # harmless here.) Bump back up if you want fresher topical finds.
    - cron: "0 6 */2 * *"
  workflow_dispatch:

permissions:
  contents: write
  actions: write # needed for `gh workflow run deploy.yml` (trigger Pages deploy)

concurrency:
  group: refresh-weird
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Generate weird-thing pool with Claude (URL liveness-gated)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: npm run generate:weird

      # Mirror the freshly-archived finds into the committed Vault snapshot the
      # browser reads (soft-fails without clobbering if the secret is missing).
      - name: Snapshot the archive → Vault
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: npm run snapshot:archive

      - name: Verify rotations still hold
        run: npm run check:daily

      - name: Commit refreshed pool (only if changed)
        id: commit
        run: |
          git config user.name "ourcade-bot"
          git config user.email "actions@users.noreply.github.com"
          git add src/data/generated/weird.js src/data/generated/_weird.md src/data/generated/vault.js src/data/generated/vault-index.js
          if git diff --staged --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No pool changes — nothing to commit."
          else
            git commit -m "chore: refresh weird-thing pool (AI-generated, liveness-checked)"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      # Commits pushed with the default GITHUB_TOKEN do NOT trigger other
      # workflows, so deploy.yml won't auto-run — kick it off explicitly.
      - name: Trigger Pages deploy
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run deploy.yml
