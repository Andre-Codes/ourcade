<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>snake</title>
<style>
  :root{
    --body:#43536f;
    --body-hi:#5a6c8e;
    --body-lo:#2c3850;
    --silver:#d2d6dd;
    --silver-hi:#eef1f4;
    --silver-lo:#aab0bb;
    --key-green:#2f7a3a;
    --key-green-lt:#5a9b5f;
    --call-green:#1fa28d;
    --lcd-frame:#222d49;
    --lcd-bg:#a8c83a;
    --ink:#1a2608;
    --desk:#0e0f12;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    margin:0;
    background:radial-gradient(120% 120% at 50% 0%, #20222a 0%, var(--desk) 70%);
    font-family:"Lucida Console","DejaVu Sans Mono",Menlo,Consolas,monospace;
    color:#9aa0a8;
    display:flex;
    justify-content:center;
    min-height:100dvh;
    padding:16px;
    /* Let the phone scroll into view when it's taller than the viewport (mobile
       landscape, short windows) instead of clipping the keypad off the bottom.
       margin:auto on .phone centers it when it fits, but (unlike align-items)
       still leaves the top reachable when it overflows. */
    overflow-y:auto;
    overflow-x:hidden;
    touch-action:manipulation;
    user-select:none;
    -webkit-user-select:none;
  }

  .phone{
    width:min(360px, 96vw);
    margin:auto;
    background:linear-gradient(180deg, var(--body-hi), var(--body) 18%, var(--body) 82%, var(--body-lo));
    border-radius:34px 34px 30px 30px;
    padding:16px 18px 20px;
    box-shadow:
      0 1px 0 rgba(255,255,255,.06) inset,
      0 -2px 6px rgba(0,0,0,.4) inset,
      0 22px 50px rgba(0,0,0,.55),
      0 4px 10px rgba(0,0,0,.4);
    display:flex;
    flex-direction:column;
    gap:12px;
  }

  .top{
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    gap:7px;
    padding-top:2px;
  }
  .earpiece{
    width:42px;height:6px;border-radius:6px;
    background:var(--body-lo);
    box-shadow:0 1px 0 rgba(255,255,255,.05);
  }
  .brand{
    font-size:10px;letter-spacing:3px;color:#cfd3da;font-weight:700;
  }

  .bezel{
    background:linear-gradient(180deg,#1c2740,#26324d);
    border-radius:10px;
    padding:12px;
    box-shadow:0 2px 5px rgba(0,0,0,.45) inset, 0 1px 0 rgba(255,255,255,.08);
  }
  canvas{
    display:block;
    width:100%;
    height:auto;
    image-rendering:pixelated;
    border-radius:3px;
    background:var(--lcd-bg);
    box-shadow:0 0 0 1px rgba(0,0,0,.4), 0 0 22px rgba(150,190,40,.25);
  }

  .controls{display:flex;flex-direction:column;gap:10px;align-items:center;}

  /* function-key cluster (3310-style: center Navi, left Phone/End key, curved up/down rocker) */
  .funcs{position:relative;width:100%;height:132px;}
  .funcs::before{
    content:"";position:absolute;left:5%;right:5%;top:0;bottom:6px;
    background:linear-gradient(180deg,#cdd1d8,#b9bec8 70%,#a4aab4);
    border-radius:42% 42% 36% 36% / 34% 34% 66% 66%;
    box-shadow:inset 0 1px 0 #fff, inset 0 -2px 4px rgba(0,0,0,.15), 0 3px 7px rgba(0,0,0,.35);
  }
  /* top-center select / OK key */
  .callkey{
    position:absolute;top:2px;left:50%;transform:translateX(-50%);
    width:50%;height:38px;border:none;cursor:pointer;z-index:3;
    background:linear-gradient(180deg,var(--silver-hi),var(--silver) 55%,var(--silver-lo));
    border-radius:48% 48% 46% 46% / 82% 82% 40% 40%;
    box-shadow:0 3px 0 #8d939d, 0 4px 7px rgba(0,0,0,.4), inset 0 1px 0 #fff;
    display:flex;align-items:flex-end;justify-content:center;padding-bottom:6px;
  }
  .callkey .dash{
    width:34px;height:7px;border-radius:7px;background:var(--call-green);
    box-shadow:0 0 5px rgba(31,162,141,.55), inset 0 1px 1px rgba(255,255,255,.4);
  }
  /* bottom-left PHONE/END key (handset), curving up under the Navi key */
  .phonekey{
    position:absolute;left:7%;bottom:8px;width:34%;height:58px;border:none;cursor:pointer;z-index:2;
    background:linear-gradient(180deg,var(--silver-hi),var(--silver) 60%,var(--silver-lo));
    box-shadow:0 2px 0 #9398a2, 0 3px 5px rgba(0,0,0,.35), inset 0 1px 0 #fff;
    border-radius:24px 52px 22px 22px / 28px 72px 22px 22px;
    display:flex;align-items:center;justify-content:center;color:var(--key-green);
  }
  .phonekey .hglyph{width:20px;height:20px;fill:currentColor;transform:rotate(8deg);}
  /* bottom-right curved up/down rocker (single housing, two press zones) */
  .nav{
    position:absolute;right:7%;bottom:8px;width:34%;height:58px;overflow:hidden;z-index:2;
    background:linear-gradient(180deg,var(--silver-hi),var(--silver) 60%,var(--silver-lo));
    box-shadow:0 2px 0 #9398a2, 0 3px 5px rgba(0,0,0,.35), inset 0 1px 0 #fff;
    border-radius:52px 24px 22px 22px / 72px 28px 22px 22px;
  }
  .nav button{
    position:absolute;left:0;width:100%;height:50%;border:none;background:transparent;cursor:pointer;
    display:flex;justify-content:center;
  }
  .nav .up{top:0;align-items:flex-end;padding-bottom:4px;}
  .nav .dn{bottom:0;align-items:flex-start;padding-top:4px;}
  .nav button.pressed{background:rgba(0,0,0,.08);}
  .chev{width:0;height:0;}
  .cu{border-left:7px solid transparent;border-right:7px solid transparent;border-bottom:10px solid var(--key-green);}
  .cd{border-left:7px solid transparent;border-right:7px solid transparent;border-top:10px solid var(--key-green);}

  .pad{
    width:100%;display:grid;grid-template-columns:repeat(3,1fr);
    gap:8px 10px;margin-top:2px;
  }
  .num{
    padding:6px 4px 8px;border-radius:50%/42%;
    background:linear-gradient(180deg,var(--silver-hi),var(--silver) 58%,var(--silver-lo));
    border:none;cursor:pointer;
    box-shadow:0 2px 0 #9398a2, 0 3px 4px rgba(0,0,0,.32), inset 0 1px 0 #fff;
    display:flex;flex-direction:column;align-items:center;line-height:1;
  }
  .num b{font-size:16px;font-weight:700;color:var(--key-green);}
  .num small{font-size:7px;letter-spacing:1px;color:var(--key-green-lt);height:8px;margin-top:2px;}

  .pressed{transform:translateY(2px)!important;box-shadow:0 0 0 #9398a2, 0 1px 2px rgba(0,0,0,.4)!important;filter:brightness(.97);}
  .callkey.pressed{transform:translateX(-50%) translateY(2px)!important;}

  .hint{font-size:9px;color:#9aa3b5;letter-spacing:1px;text-align:center;margin-top:0;}
  /* The keypad always shows now — the body scrolls when the phone is taller than
     the viewport, so the pad is reachable instead of clipped (it used to be
     hidden under 760px tall, which broke texting on the personal phone and on
     short mobile windows). */
  /* offscreen, audio-only YouTube host. NOT display:none — some browsers pause
     fully-hidden media; 1x1 + opacity:0 keeps the audio alive (same as the site Walkman). */
  #ythost{position:fixed;left:0;bottom:0;width:1px;height:1px;opacity:0;pointer-events:none;z-index:-1;}
</style>
</head>
<body>
  <div class="phone">
    <div class="top">
      <div class="earpiece"></div>
      <div class="brand">N O P I A</div>
    </div>

    <div class="bezel">
      <canvas id="lcd" width="400" height="360"></canvas>
    </div>

    <div class="controls">
      <div class="funcs">
        <button class="callkey" id="callKey" aria-label="Navi / Menu / Call"><span class="dash"></span></button>
        <button class="phonekey" id="phoneKey" aria-label="Phone / End">
          <svg class="hglyph" viewBox="0 0 24 24" aria-hidden="true"><path d="M6.6 10.8c1.4 2.8 3.8 5.2 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1C10.6 21 3 13.4 3 4c0-.6.4-1 1-1h3.6c.6 0 1 .4 1 1 0 1.3.2 2.5.6 3.6.1.3 0 .7-.2 1l-2.4 2.2z"/></svg>
        </button>
        <div class="nav">
          <button class="up" id="upKey" aria-label="Up"><i class="chev cu"></i></button>
          <button class="dn" id="dnKey" aria-label="Down"><i class="chev cd"></i></button>
        </div>
      </div>

      <div class="pad" id="pad">
        <button class="num" data-key="1"><b>1</b><small>&nbsp;</small></button>
        <button class="num" data-key="2"><b>2</b><small>ABC</small></button>
        <button class="num" data-key="3"><b>3</b><small>DEF</small></button>
        <button class="num" data-key="4"><b>4</b><small>GHI</small></button>
        <button class="num" data-key="5"><b>5</b><small>JKL</small></button>
        <button class="num" data-key="6"><b>6</b><small>MNO</small></button>
        <button class="num" data-key="7"><b>7</b><small>PQRS</small></button>
        <button class="num" data-key="8"><b>8</b><small>TUV</small></button>
        <button class="num" data-key="9"><b>9</b><small>WXYZ</small></button>
        <button class="num" data-key="star"><b>*</b><small>&nbsp;</small></button>
        <button class="num" data-key="0"><b>0</b><small>&nbsp;</small></button>
        <button class="num" data-key="hash"><b>#</b><small>&nbsp;</small></button>
      </div>
      <div class="hint">swipe or arrow keys to steer &middot; menu for more</div>
    </div>
  </div>

  <!-- hidden audio-only YouTube player (the "real call" song) -->
  <div id="ythost"></div>

<script>
(function(){
  "use strict";

  /* ====================================================================
     NOPIA — a tiny Nokia-3310-style "OS": a screen/app stack, a soft-key
     label bar, a per-user persistent store, and apps (Menu, Games/Snake,
     Services browser, Composer, Messages, Names, Profiles, Settings, Clock).
     New apps = one object implementing { render, navi, back, up, down, key }.
     ==================================================================== */

  /* ---------- tuning levers ---------- */
  const GW = 20, GH = 15;          // phone play grid (cells)
  const WEB_GW = 12, WEB_GH = 8;   // embedded browser grid (cells)
  const START_LEN = 4;             // starting snake length
  const STEP_MIN = 95;             // fastest step (ms)
  const STEP_DROP = 5;             // ms shaved per food
  const BLINK_MS = 380;            // blink period

  /* ---------- persistent per-user store ----------
     One JSON blob, namespaced by uid() so a future accounts/Firebase layer can
     sync per user. Messages go through Transport (the only seam a future
     FirebaseTransport must replace to deliver a text to another user's phone). */
  function uid(){ try{ return localStorage.getItem('ourcade:nokia:uid') || 'guest'; }catch(e){ return 'guest'; } }
  function dbKey(){ return 'ourcade:nokia:' + uid(); }
  const DEFAULTS = {
    settings:{ soundOn:true, profile:'GENERAL', keypadTones:true, maze:false, level:3, greeting:'OURCADE', clock24:true },
    snake:{ hi:0, webPlayed:false, webBest:0 },
    spaceimpact:{ hi:0 },
    contacts:[ {name:'JENNY', addr:'8675309'}, {name:'OURCADE', addr:'6287'} ],
    messages:[],
    composer:[]
  };
  let DB = loadDB();
  function clone(o){ return JSON.parse(JSON.stringify(o)); }
  function deepDefaults(d, def){
    if(d===null || typeof d!=='object') return clone(def);
    if(Array.isArray(def)) return Array.isArray(d) ? d : clone(def);
    const out = {};
    for(const k in def){
      if(def[k] && typeof def[k]==='object' && !Array.isArray(def[k])) out[k] = deepDefaults(d[k], def[k]);
      else out[k] = (d[k]!==undefined) ? d[k] : clone(def[k]);
    }
    return out;
  }
  function loadDB(){
    let d = null;
    try{ d = JSON.parse(localStorage.getItem(dbKey()) || 'null'); }catch(e){ d = null; }
    d = deepDefaults(d, DEFAULTS);
    // one-time migration of the old flat snake keys
    try{
      const lh = parseInt(localStorage.getItem('ourcade:snake:hi'));
      if(!isNaN(lh) && lh > d.snake.hi) d.snake.hi = lh;
      if(localStorage.getItem('ourcade:snake:webPlayed') === '1') d.snake.webPlayed = true;
      const wb = parseInt(localStorage.getItem('ourcade:snake:webBest'));
      if(!isNaN(wb) && wb > d.snake.webBest) d.snake.webBest = wb;
    }catch(e){}
    return d;
  }
  // In PERSONAL mode the cloud is the only source of truth for messages, so we
  // NEVER persist the relayed inbox/sent to localStorage — otherwise a later boot
  // would loadDB() a stale cache and flash phantom messages before the live
  // snapshot lands. The in-memory DB.messages still holds the live snapshot for
  // rendering; only the persisted copy is emptied. GUEST mode persists normally.
  function saveDB(){ try{ const toStore = PERSONAL ? { ...DB, messages: [] } : DB; localStorage.setItem(dbKey(), JSON.stringify(toStore)); }catch(e){} }
  function factoryReset(){ DB = clone(DEFAULTS); saveDB(); }

  /* Messages transport seam. In GUEST/kiosk mode (the public Snake cabinet) it
     files locally and fakes a reply, exactly as before. In PERSONAL mode (the
     phone embedded on /me with ?personal=1) it speaks to the React parent over
     postMessage — the parent holds the Firebase listeners and is the source of
     truth; DB.messages becomes a render cache the parent hydrates. */
  const PERSONAL = new URLSearchParams(location.search).has('personal');
  let IDENTITY = null;              // {uid, number, username} once the parent answers
  const NAMELABELS = {};            // addr → display name from cloud (for contactName)
  let SYNCED = [];                  // cloud-synced contacts [{name, number}] (personal mode)
  function postToParent(msg){ try{ if(window.parent!==window) window.parent.postMessage(msg, location.origin); }catch(e){} }
  // The phonebook the UI shows: built-in DB.contacts (JENNY/OURCADE, addr-based)
  // plus the cloud-synced ones (number-based). Synced wins on a number clash.
  function allContacts(){
    const out = SYNCED.map(c=>({ name:c.name, addr:c.number }));
    const have = new Set(out.map(c=>c.addr));
    for(const c of DB.contacts){ if(!have.has(c.addr)) out.push(c); }
    return out;
  }

  const Transport = {
    send(to, body){
      if(PERSONAL){
        // Hand the send to the parent, which resolves the number/@handle → uid,
        // writes to Firebase, AND echoes an optimistic row into its own sent[]
        // state under the cloud id — so the snapshot it posts back already shows
        // this message. We add nothing locally (a local-id echo would collide
        // with that snapshot and get wiped by replacePartition); the rAF loop
        // redraws SENT from the authoritative nopia:sent snapshot.
        postToParent({ type:'nopia:send', to, body });
        return null;
      }
      const m = { id:Date.now()+'-'+Math.floor(Math.random()*1e4), from:uid(), to, body, ts:Date.now(), folder:'sent', read:true };
      DB.messages.push(m); saveDB();
      autoReply(to);                 // guest demo only
      return m;
    },
    poll(){ /* personal mode is push-driven by the parent; nothing to poll */ }
  };
  function autoReply(to){
    if(PERSONAL) return;             // never fake replies on a real phone
    const replies = ['OK','LOL','ON MY WAY','CALL ME','NICE','HAHA','SEE U SOON','K'];
    setTimeout(()=>{
      DB.messages.push({ id:Date.now()+'-r'+Math.floor(Math.random()*1e4), from:to, to:uid(),
        body:replies[(Math.random()*replies.length)|0], ts:Date.now(), folder:'inbox', read:false });
      saveDB();
    }, 1600);
  }
  function contactName(addr){
    const s = SYNCED.find(c=>c.number===addr); if(s) return s.name;
    const c = DB.contacts.find(c=>c.addr===addr); if(c) return c.name;
    return NAMELABELS[addr] || addr;
  }

  /* ---------- 5x7 dot-matrix font ---------- */
  const F = {
    '0':["01110","10001","10011","10101","11001","10001","01110"],
    '1':["00100","01100","00100","00100","00100","00100","01110"],
    '2':["01110","10001","00001","00110","01000","10000","11111"],
    '3':["11110","00001","00001","01110","00001","00001","11110"],
    '4':["00010","00110","01010","10010","11111","00010","00010"],
    '5':["11111","10000","10000","11110","00001","10001","01110"],
    '6':["01110","10001","10000","11110","10001","10001","01110"],
    '7':["11111","00001","00010","00100","01000","01000","01000"],
    '8':["01110","10001","10001","01110","10001","10001","01110"],
    '9':["01110","10001","10001","01111","00001","10001","01110"],
    'A':["01110","10001","10001","11111","10001","10001","10001"],
    'B':["11110","10001","10001","11110","10001","10001","11110"],
    'C':["01110","10001","10000","10000","10000","10001","01110"],
    'D':["11100","10010","10001","10001","10001","10010","11100"],
    'E':["11111","10000","10000","11110","10000","10000","11111"],
    'F':["11111","10000","10000","11110","10000","10000","10000"],
    'G':["01110","10001","10000","10111","10001","10001","01110"],
    'H':["10001","10001","10001","11111","10001","10001","10001"],
    'I':["01110","00100","00100","00100","00100","00100","01110"],
    'J':["00111","00010","00010","00010","10010","10010","01100"],
    'K':["10001","10010","10100","11000","10100","10010","10001"],
    'L':["10000","10000","10000","10000","10000","10000","11111"],
    'M':["10001","11011","10101","10101","10001","10001","10001"],
    'N':["10001","10001","11001","10101","10011","10001","10001"],
    'O':["01110","10001","10001","10001","10001","10001","01110"],
    'P':["11110","10001","10001","11110","10000","10000","10000"],
    'Q':["01110","10001","10001","10001","10101","10010","01101"],
    'R':["11110","10001","10001","11110","10100","10010","10001"],
    'S':["01110","10001","10000","01110","00001","10001","01110"],
    'T':["11111","00100","00100","00100","00100","00100","00100"],
    'U':["10001","10001","10001","10001","10001","10001","01110"],
    'V':["10001","10001","10001","10001","10001","01010","00100"],
    'W':["10001","10001","10001","10101","10101","11011","10001"],
    'X':["10001","10001","01010","00100","01010","10001","10001"],
    'Y':["10001","10001","01010","00100","00100","00100","00100"],
    'Z':["11111","00001","00010","00100","01000","10000","11111"],
    ' ':["00000","00000","00000","00000","00000","00000","00000"],
    ':':["00000","00100","00000","00000","00000","00100","00000"],
    '!':["00100","00100","00100","00100","00100","00000","00100"],
    '.':["00000","00000","00000","00000","00000","00100","00100"],
    ',':["00000","00000","00000","00000","00100","00100","01000"],
    '?':["01110","10001","00001","00110","00100","00000","00100"],
    '-':["00000","00000","00000","11111","00000","00000","00000"],
    '/':["00001","00010","00010","00100","01000","01000","10000"],
    '(':["00010","00100","01000","01000","01000","00100","00010"],
    ')':["01000","00100","00010","00010","00010","00100","01000"],
    '>':["10000","01000","00100","00010","00100","01000","10000"],
    '*':["00000","00100","10101","01110","10101","00100","00000"],
    '#':["01010","01010","11111","01010","11111","01010","01010"]
  };

  /* ---------- canvas / layout ---------- */
  const canvas = document.getElementById('lcd');
  const ctx = canvas.getContext('2d');
  const reduceMotion = window.matchMedia &&
        window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  let DPR = 1, cell = 16, statusH = 18, softH = 22, pad = 6, fs = 2;
  let lcdW = 0, lcdH = 0;

  function layout(){
    const cssW = canvas.clientWidth || 320;
    cell = Math.max(8, Math.floor(cssW / GW));
    fs = Math.max(2, Math.floor(cell / 7));
    statusH = 9 * fs + 6;
    softH = 9 * fs + 4;
    pad = Math.max(4, Math.round(cell * 0.35));
    lcdW = GW * cell + pad * 2;
    lcdH = statusH + GH * cell + pad * 2;
    DPR = Math.min(3, window.devicePixelRatio || 1);
    canvas.width = Math.round(lcdW * DPR);
    canvas.height = Math.round(lcdH * DPR);
    canvas.style.height = (lcdH * (canvas.clientWidth / lcdW)) + "px";
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    ctx.imageSmoothingEnabled = false;
    applyVenue();
  }

  /* ---------- play-field "venue" geometry (phone LCD vs embedded browser box) ---------- */
  let venue = 'phone';
  let gw = GW, gh = GH, fcell = 16, ox = 6, oy = 24;
  function applyVenue(){
    if(venue === 'web'){
      gw = WEB_GW; gh = WEB_GH;
      const barH = 9*fs, headH = 9*fs;
      const boxTop = statusH + barH + headH + 3;
      const boxBottom = lcdH - pad - 8*fs;
      const availW = lcdW - 2*(pad+3);
      const availH = boxBottom - boxTop;
      fcell = Math.max(6, Math.min(Math.floor(availW/gw), Math.floor(availH/gh)));
      const fieldW = gw*fcell, fieldH = gh*fcell;
      ox = Math.round((lcdW - fieldW)/2);
      oy = boxTop + Math.max(0, Math.round((availH - fieldH)/2));
    } else {
      gw = GW; gh = GH; fcell = cell; ox = pad; oy = statusH + pad;
    }
  }

  /* ---------- text ---------- */
  function textW(str, s){ return ((str+"").length) * 6 * s - s; }
  function drawText(str, x, y, s, color){
    ctx.fillStyle = color;
    str = (str+"").toUpperCase();
    for(let i=0;i<str.length;i++){
      const g = F[str[i]] || F['?'];
      const gx = x + i * 6 * s;
      for(let r=0;r<7;r++){
        const row = g[r];
        for(let c=0;c<5;c++){ if(row[c]==='1') ctx.fillRect(gx + c*s, y + r*s, s, s); }
      }
    }
  }
  function drawTextCentered(str, y, s, color){ drawText(str, Math.round((lcdW - textW(str,s))/2), y, s, color); }
  function blinkOn(){ return (Math.floor(performance.now()/BLINK_MS))%2===0; }
  let ink = '#1a2608', bg = '#a8c83a', ghost = 'rgba(26,38,8,0.10)';
  function clearLCD(){ ctx.fillStyle = bg; ctx.fillRect(0,0,lcdW,lcdH); }

  // char-wrapped text starting at (pad, top); returns the next caret {x,y}
  function drawWrapped(str, top, s, bottom){
    str = (str+"").toUpperCase();
    const max = Math.max(1, Math.floor((lcdW - 2*pad) / (6*s)));
    for(let i=0;i<str.length;i++){
      const col = i % max, row = (i/max)|0, y = top + row*8*s;
      if(y > bottom) break;
      drawText(str[i], pad + col*6*s, y, s, ink);
    }
    const idx = str.length, col = idx % max, row = (idx/max)|0;
    return { x: pad + col*6*s, y: top + row*8*s };
  }

  /* ---------- audio ---------- */
  let actx = null;
  function audible(){ return DB.settings.soundOn && DB.settings.profile !== 'SILENT'; }
  function beep(freq, dur, vol){
    if(!audible()) return;
    try{
      if(!actx) actx = new (window.AudioContext||window.webkitAudioContext)();
      if(actx.state === 'suspended') actx.resume();
      const o = actx.createOscillator(), g = actx.createGain();
      o.type = 'square'; o.frequency.value = freq;
      g.gain.value = 0.0001;
      o.connect(g); g.connect(actx.destination);
      const t = actx.currentTime;
      g.gain.exponentialRampToValueAtTime(vol||0.05, t+0.008);
      g.gain.exponentialRampToValueAtTime(0.0001, t+(dur||0.07));
      o.start(t); o.stop(t+(dur||0.07)+0.02);
    }catch(e){}
  }
  const sEat  = ()=>beep(880, 0.05, 0.05);
  const sTurn = ()=>beep(440, 0.02, 0.02);
  const sOver = ()=>{ beep(200,0.18,0.06); setTimeout(()=>beep(150,0.26,0.06),140); };
  const sClick= ()=>beep(660, 0.025, 0.03);
  function click(){ if(DB.settings.keypadTones) sClick(); }   // keypad tone (gated)

  // two-tone DTMF for the dialer
  const DTMF = {'1':[697,1209],'2':[697,1336],'3':[697,1477],'4':[770,1209],'5':[770,1336],
    '6':[770,1477],'7':[852,1209],'8':[852,1336],'9':[852,1477],'*':[941,1209],'0':[941,1336],'#':[941,1477]};
  function dtmf(ch){
    if(!DB.settings.keypadTones || !audible()) return;
    const p = DTMF[ch]; if(!p) return;
    try{
      if(!actx) actx = new (window.AudioContext||window.webkitAudioContext)();
      if(actx.state==='suspended') actx.resume();
      const t = actx.currentTime;
      p.forEach(f=>{ const o=actx.createOscillator(), g=actx.createGain(); o.type='sine'; o.frequency.value=f;
        g.gain.value=0.0001; o.connect(g); g.connect(actx.destination);
        g.gain.exponentialRampToValueAtTime(0.05, t+0.01);
        g.gain.exponentialRampToValueAtTime(0.0001, t+0.13);
        o.start(t); o.stop(t+0.15); });
    }catch(e){}
  }

  // composer notes (~2 octaves) — keys 1..0 map to a scale so tunes work
  const NOTE_FREQ = {C:261.63,D:293.66,E:329.63,F:349.23,G:392.00,A:440.00,B:493.88,C2:523.25,D2:587.33,E2:659.25};
  const NOTE_KEYS = {'1':'C','2':'D','3':'E','4':'F','5':'G','6':'A','7':'B','8':'C2','9':'D2','0':'E2'};
  function playNote(n, dur){ beep(NOTE_FREQ[n]||440, dur||0.18, 0.06); }
  function playSeq(seq){
    if(!seq || !seq.length) return;
    let i = 0; const tempo = 230;
    (function nx(){ if(i>=seq.length) return; playNote(seq[i], 0.2); i++; setTimeout(nx, tempo); })();
  }
  const PRESETS = [
    { name:'MARY LAMB', seq:['E','D','C','D','E','E','E','D','D','D','E','G','G','E','D','C','D','E','E','E','E','D','D','E','D','C'] },
    { name:'TWINKLE',   seq:['C','C','G','G','A','A','G','F','F','E','E','D','D','C'] }
  ];

  /* ---------- classic ringtone (Gran Vals) ---------- */
  let ringNodes = [], ringtonePlaying = false, ringTimer = null;
  function stopRingtone(){
    ringNodes.forEach(n=>{ try{ n.stop(); }catch(e){} });
    ringNodes = []; ringtonePlaying = false;
    if(ringTimer){ clearTimeout(ringTimer); ringTimer = null; }
  }
  function playRingtone(){
    if(!audible()) return;
    try{ if(!actx) actx = new (window.AudioContext||window.webkitAudioContext)(); if(actx.state==='suspended') actx.resume(); }catch(e){ return; }
    stopRingtone();
    const N={A5:880,B5:987.77,Cs5:554.37,Cs6:1108.73,D5:587.33,D6:1174.66,E5:659.25,E6:1318.51,Fs5:739.99,Gs5:830.61};
    const PITCH=1.18, u=0.11;
    const seq=[['E6',1],['D6',1],['Fs5',2],['Gs5',2],['Cs6',1],['B5',1],['D5',2],['E5',2],['B5',1],['A5',1],['Cs5',2],['E5',2],['A5',4]];
    let t = actx.currentTime + 0.05;
    seq.forEach(p=>{
      const dur = p[1]*u;
      const o = actx.createOscillator(), g = actx.createGain();
      o.type='square'; o.frequency.value = N[p[0]]*PITCH;
      g.gain.value = 0.0001;
      o.connect(g); g.connect(actx.destination);
      g.gain.exponentialRampToValueAtTime(0.06, t+0.012);
      g.gain.exponentialRampToValueAtTime(0.0001, t+dur*0.92);
      o.start(t); o.stop(t+dur);
      ringNodes.push(o);
      t += dur;
    });
    ringtonePlaying = true;
    const ms = (t - actx.currentTime)*1000;
    ringTimer = setTimeout(()=>{ ringtonePlaying=false; ringNodes=[]; }, ms+60);
  }

  /* ---------- hidden YouTube (the "real call" plays a song, audio only) ---------- */
  const JENNY_NUMBER = '8675309';
  const JENNY_IDS = ['6WTdTwcmxyo', '5tJ_w8HG1Tg'];

  /* ====================================================================
     SNAKE ENGINE (shared by phone + embedded-browser venues)
     ==================================================================== */
  let snake, dir, buf, food, score, stepMs, acc, last, deathBlink;
  function levelMs(){ return Math.max(STEP_MIN, 260 - (DB.settings.level||3)*20); }
  function reset(){
    snake = [];
    const cx = Math.floor(gw/2), cy = Math.floor(gh/2);
    for(let i=0;i<START_LEN;i++) snake.push({x:cx-i, y:cy});
    dir = {x:1,y:0}; buf = [];
    score = 0; stepMs = levelMs(); acc = 0; deathBlink = 0;
    placeFood();
  }
  function placeFood(){
    const occ = new Set(snake.map(s=>s.x+","+s.y));
    let p, tries=0;
    do{ p={x:(Math.random()*gw)|0, y:(Math.random()*gh)|0}; tries++; }
    while(occ.has(p.x+","+p.y) && tries<500);
    food = p;
  }
  function setDir(d){
    if(d==='up') queueDir(0,-1); else if(d==='down') queueDir(0,1);
    else if(d==='left') queueDir(-1,0); else if(d==='right') queueDir(1,0);
  }
  function queueDir(nx,ny){
    if(cur() !== SnakeApp || SnakeApp.paused || SnakeApp.over) return;
    const c = buf.length ? buf[buf.length-1] : dir;
    if(c.x===-nx && c.y===-ny) return;
    if(c.x===nx && c.y===ny) return;
    if(buf.length<2){ buf.push({x:nx,y:ny}); sTurn(); }
  }
  function step(){
    if(buf.length){ dir = buf.shift(); }
    let hx = snake[0].x + dir.x, hy = snake[0].y + dir.y;
    if(DB.settings.maze){ hx=(hx+gw)%gw; hy=(hy+gh)%gh; }
    else if(hx<0||hy<0||hx>=gw||hy>=gh){ return die(); }
    const willGrow = (hx===food.x && hy===food.y);
    const limit = willGrow ? snake.length : snake.length-1;
    for(let i=0;i<limit;i++){ if(snake[i].x===hx && snake[i].y===hy) return die(); }
    snake.unshift({x:hx,y:hy});
    if(willGrow){ score+=1; stepMs=Math.max(STEP_MIN, stepMs-STEP_DROP); placeFood(); sEat(); }
    else snake.pop();
  }
  function die(){
    sOver(); deathBlink = 0; SnakeApp.over = true;
    if(score > DB.snake.hi){ DB.snake.hi = score; saveDB(); }
    if(SnakeApp.venue==='web' && score > DB.snake.webBest){ DB.snake.webBest = score; saveDB(); }
    // Arcade Score Standard: report this run to the Ourcade shell, which
    // submits it to the shared high-score board (claimed accounts only). The
    // '*' target is fine — we send only a score, no secrets.
    try { window.parent !== window && window.parent.postMessage({ type:'ourcade:score', gameId:'snake', score }, '*'); } catch(e){}
  }

  /* ---------- field rendering ---------- */
  function px(cx){ return ox + cx*fcell; }
  function py(cy){ return oy + cy*fcell; }
  function drawCellBlock(cx,cy){
    const m = Math.max(1, Math.round(fcell*0.12));
    ctx.fillStyle = ink; ctx.fillRect(px(cx)+m, py(cy)+m, fcell-m*2, fcell-m*2);
  }
  function drawGhostGrid(){
    ctx.fillStyle = ghost;
    const m = Math.max(1, Math.round(fcell*0.12));
    for(let y=0;y<gh;y++) for(let x=0;x<gw;x++) ctx.fillRect(px(x)+m, py(y)+m, fcell-m*2, fcell-m*2);
  }
  function drawField(){
    drawGhostGrid();
    const playing = !SnakeApp.paused && !SnakeApp.over;
    if(blinkOn() || !playing){
      const m = Math.max(1, Math.round(fcell*0.12));
      ctx.fillStyle = ink; ctx.fillRect(px(food.x)+m, py(food.y)+m, fcell-m*2, fcell-m*2);
      ctx.fillStyle = bg; const im = Math.max(1, Math.round(fcell*0.30));
      ctx.fillRect(px(food.x)+im, py(food.y)+im, fcell-im*2, fcell-im*2);
    }
    const hidden = SnakeApp.over && (Math.floor(deathBlink/220)%2===1);
    if(!hidden){
      for(let i=0;i<snake.length;i++) drawCellBlock(snake[i].x, snake[i].y);
      const h = snake[0]; ctx.fillStyle = bg;
      const e = Math.max(1, Math.round(fcell*0.16));
      ctx.fillRect(px(h.x)+Math.round(fcell*0.5)-e, py(h.y)+Math.round(fcell*0.34)-e, e, e);
    }
  }
  function overlayRegion(lines, top, bottom){
    ctx.fillStyle = 'rgba(168,200,58,0.6)'; ctx.fillRect(0, top, lcdW, bottom-top);
    let totalH = 0; lines.forEach(l=>{ totalH += (l.s*8)+4; });
    let y = top + (bottom - top - totalH)/2;
    lines.forEach(l=>{ const vis = l.blink ? blinkOn() : true; if(vis) drawTextCentered(l.t, Math.round(y), l.s, ink); y += l.s*8 + 4; });
  }
  function overlayBox(lines){ overlayRegion(lines, statusH, lcdH); }

  /* ---------- canvas icons (used for the award badge) ---------- */
  function drawIcon(kind, cx, cy, r){
    ctx.fillStyle = ink; ctx.strokeStyle = ink; ctx.lineWidth = Math.max(1, fs*0.7);
    if(kind==='globe'){
      ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.stroke();
      ctx.beginPath(); ctx.ellipse(cx,cy,r*0.48,r,0,0,Math.PI*2); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(cx-r,cy); ctx.lineTo(cx+r,cy); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(cx-r*0.86,cy-r*0.5); ctx.lineTo(cx+r*0.86,cy-r*0.5); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(cx-r*0.86,cy+r*0.5); ctx.lineTo(cx+r*0.86,cy+r*0.5); ctx.stroke();
    }
  }
  function drawAwardBadge(){
    const label = "NET SNAKE", r = 3*fs, tw = textW(label, fs);
    const totalW = r*2 + 5 + tw, cx = Math.round((lcdW - totalW)/2) + r, cy = lcdH - softH - 4*fs;

  /* ---------- connecting-people egg ---------- */
  function drawHand(ymid, gap, u, sign){
    const tipX = lcdW/2 - sign*(gap/2);
    ctx.save(); ctx.translate(tipX, ymid); ctx.scale(sign, 1); ctx.fillStyle = ink;
    ctx.fillRect(-40*u, -3*u, 34*u, 6*u);
    ctx.fillRect(-12*u, -6*u, 8*u, 12*u);
    ctx.fillRect(-9*u, -9.5*u, 2.6*u, 4*u);
    ctx.fillRect(-6*u, -1.7*u, 6*u, 3.4*u);
    ctx.fillRect(-0.6*u, -1.3*u, 1.4*u, 2.6*u);

  function drawEgg(t){
    clearLCD();
    const ymid = statusH + (lcdH - statusH)/2 + 6;

    drawHand(ymid, gap, u, +1); drawHand(ymid, gap, u, -1);

  let screenStack = [];

  function pushScreen(s){ if(s.enter) s.enter(); screenStack.push(s); }
  function popScreen(){ const s = screenStack.pop(); if(s && s.exit) s.exit(); if(!screenStack.length) pushScreen(Standby); }
  function goScreen(s){ const old = screenStack.pop(); if(old && old.exit) old.exit(); pushScreen(s); }

  /* content region helpers (chrome screens leave room for status + soft bars) */
  function contentTop(){ return statusH + 2; }

  function drawListBody(title, labels, idx, numbered){
    let top = contentTop();
    if(title){ drawTextCentered(title, top, fs, ink); top += 10*fs; }
    const bottom = contentBottom(), lineH = 9*fs;
    const rows = Math.max(1, Math.floor((bottom-top)/lineH));
    let start = 0;
    if(labels.length>rows) start = Math.min(Math.max(0, idx-(rows>>1)), labels.length-rows);
    for(let r=0;r<rows && start+r<labels.length;r++){
      const i = start+r, y = top + r*lineH;
      const text = (numbered?((i+1)+' '):'') + labels[i];
      if(i===idx){ ctx.fillStyle=ink; ctx.fillRect(pad-1, y-1, lcdW-2*(pad-1), lineH-1); drawText(text, pad+2, y, fs, bg); }
      else drawText(text, pad+2, y, fs, ink);
    }
    if(start>0) drawTextCentered('-', top-7*fs+1, fs, ink);
  }

  // generic scrolling list app
  function ListScreen(opts){
    return {
      id: opts.id, idx: 0,
      statusLeft: (opts.statusLeft!=null ? opts.statusLeft : 'OURCADE'),
      get soft(){ return opts.soft || 'Select'; },
      enter(){ this.idx = 0; },
      items(){ return opts.items(); },
      up(){ const n=this.items().length; if(n){ this.idx=(this.idx+n-1)%n; click(); } },
      down(){ const n=this.items().length; if(n){ this.idx=(this.idx+1)%n; click(); } },
      navi(){ const it=this.items()[this.idx]; if(it && it.run) it.run(); },
      key(ch){
        const items=this.items();
        if(opts.numbered){
          // numbered menus use number-key shortcuts (authentic); scroll keys still scroll
          const n=parseInt(ch); if(n>=1 && n<=items.length){ this.idx=n-1; this.navi(); } else click();
        } else {
          // unnumbered lists: 2/8 scroll, 5 selects as a keypad convenience
          if(ch==='2') this.up(); else if(ch==='8') this.down(); else if(ch==='5') this.navi(); else click();
        }
      },
      back(){ popScreen(); },
      render(){ drawListBody(opts.title, this.items().map(i=>i.label), this.idx, !!opts.numbered); }
    };
  }

  const Dialer = {
    id:'dialer', statusLeft:'OURCADE', buf:'',

  /* ===================================================================
     SPACE IMPACT — full faithful rebuild (phone-only; no public page).
     A nostalgia-first take on the Nokia classic. The ship is pinned to the
     left and only moves up/down; forward motion is the illusion of a world
     scrolling leftward. This rebuild adds the things that make Space Impact
     memorable: weapon levels 1-4 (persist between levels, decay one step on
     death), the full enemy mix (straight / sine / diver / turret), scrolling
     terrain tunnels, a 5-level hand-authored campaign, and end-of-level
     bosses with HP phases at 75/50/25%.

     Structure: SI_LEVELS (authorable timelines), SI_BOSSES (boss defs), and
     SI (pure behavior helpers) keep the data and behavior out of the screen
     object so SpaceImpactApp stays close to its original shape and the
     screen-object contract the rAF loop relies on is untouched.

     Auto-fire keeps the only live control the d-pad (up/down) so it never
     fights Snake's hard-wired setDir(). Everything is chunky fillRects in the
     LCD pixel space — no smoothing, authentically blocky. All motion is
     v*dt*0.06 (px/ms), dt clamped to 60ms so a GC stall can't teleport. */

  // Pure behavior helpers — no state of their own; `s` is the SpaceImpactApp.
  const SI = {
    // per-type enemy motion. straight/sine fly in screen space; turret is
    // map-locked (its world-X minus the camera).
    enemyUpdate: {
      straight(e,s,dt){ e.x += e.vx*dt*0.06; },
      sine(e,s,dt){ e.x += e.vx*dt*0.06; e.y = e.baseY + Math.sin(s.t*e.freq + e.phase)*e.amp; },
      diver(e,s,dt){
        e.x += e.vx*dt*0.06;
        if(!e.locked && e.x < lcdW*0.8){ e.locked = true; e.vy = ((s.shipY - e.y) > 0 ? 1 : -1) * e.dvy; }
        if(e.locked){ e.y += e.vy*dt*0.06; }
      },
      turret(e,s,dt){ e.x = e.wx - s.camX; e.alive = e.x + e.w > 0 && e.x < lcdW + 4; },
    },
    // per-type enemy fire. straight/sine shoot straight left; turret aims at
    // the ship's current Y; divers don't fire (the dive IS the attack).
    enemyFire(e, s){
      const bx = e.x, by = e.y + (e.h>>1);
      if(e.type==='turret'){
        const ty = s.shipY + (s.shipH>>1);
        const dy = ty - by, dx = -Math.max(20, bx);
        const m = Math.hypot(dx, dy) || 1, spd = 1.6 + 0.12*s.levelIdx;
        s.pushEBullet({ x:bx, y:by, vx:dx/m*spd, vy:dy/m*spd });
      } else {
        s.pushEBullet({ x:bx, y:by, vx:-(1.4 + 0.12*s.levelIdx + Math.random()*0.5), vy:0 });
      }
    },
    // boss movement patterns (mutate boss.y / boss.x within the arena).
    bossMove: {
      hover(b,s,dt){ b.y = b.baseY + Math.sin(s.t*0.0026 + b.phase)*Math.min(10, b.range*0.4); },
      sweep(b,s,dt){ b.y = b.baseY + Math.sin(s.t*0.0024 + b.phase)*b.range; },
      charge(b,s,dt){
        b.y = b.baseY + Math.sin(s.t*0.003 + b.phase)*b.range*0.5;
        if(b.chargeT==null){ b.chargeT = 0; b.chargeDir = 1; }
        b.chargeT += dt;
        if(b.chargeDir>0){ b.x -= 0.9*dt*0.06; if(b.x <= s.shipX + s.shipW + 14){ b.chargeDir = -1; } }
        else { b.x += 0.6*dt*0.06; if(b.x >= b.homeX){ b.x = b.homeX; b.chargeDir = 1; } }
      },
    },
    // boss fire patterns -> enemy bullets.
    bossFire: {
      spread3(b,s){ const x=b.x, y=b.y + (b.h>>1), spd=1.7;
        for(const vy of [-0.9,0,0.9]) s.pushEBullet({ x, y, vx:-spd, vy }); },
      aimed2(b,s){ const x=b.x, y=b.y + (b.h>>1), ty=s.shipY + (s.shipH>>1);
        for(const off of [-3,3]){ const dy=(ty+off)-y, dx=-Math.max(20,x), m=Math.hypot(dx,dy)||1, spd=2.0;
          s.pushEBullet({ x, y, vx:dx/m*spd, vy:dy/m*spd }); } },
    },
    // per-type enemy render in the chunky fillRect idiom.
    drawEnemy(e){
      const ex = Math.round(e.x), ey = Math.round(e.y);
      ctx.fillStyle = ink; ctx.fillRect(ex, ey, e.w, e.h);
      ctx.fillStyle = bg; // eye notch -> reads as facing left
      ctx.fillRect(ex+1, ey+1, 2, 2);
      if(e.type==='diver'){ ctx.fillStyle = ink; ctx.fillRect(ex-2, ey + (e.h>>1) - 1, 2, 2); } // nose fin
      if(e.type==='turret'){ ctx.fillStyle = ink; const by = e.side==='bot' ? ey-2 : ey+e.h; ctx.fillRect(ex+(e.w>>1)-1, by, 2, 2); } // barrel
    },
  };

  const SpaceImpactApp = {
    id:'spaceimpact', statusBar:false, paused:false, over:false,
    get soft(){ return ''; },
    start(){
      // play area sits below the status bar, inset by a small margin
      this.top = statusH + 2; this.bottom = lcdH - 2;
      this.h = this.bottom - this.top;
      this.shipW = Math.max(7, Math.round(cell*0.7));
      this.shipH = Math.max(5, Math.round(cell*0.5));
      this.shipX = pad + 2;
      this.score = 0; this.lives = 3; this.weapon = 1;
      this.won = false;
      this.levelIdx = 0;
      this.beginLevel();
      this.paused = false; this.over = false; last = 0;
    },
    // reset everything that belongs to a single level; keep score/lives/weapon
    beginLevel(){
      this.shipY = this.top + Math.round(this.h/2);
      this.bullets = []; this.enemies = []; this.eBullets = []; this.powerups = [];
      this.terrain = []; this.pending = []; this.fx = [];
      this.boss = null; this.phase = 'scroll';
      this.camX = 0; this.lastCamX = 0; this.evIdx = 0;
      this.scrollSpd = (SI_LEVELS[this.levelIdx] || SI_LEVELS[0]).scroll;
      this.fireAcc = 0; this.t = 0; this.invuln = 0;
      this.banner = 'LEVEL ' + (this.levelIdx+1); this.bannerT = 1400;
    },
    nextLevel(){
      this.levelIdx++;
      if(this.levelIdx >= SI_LEVELS.length){ this.win(); return; }
      this.beginLevel();
    },
    // ── helpers ──────────────────────────────────────────────────────────
    yOf(yf){ return this.top + 4 + yf*(this.h - 8); },
    pushEBullet(b){ this.eBullets.push(b); if(this.eBullets.length > 24) this.eBullets.shift(); },
    // resolve a level event into live objects (or a pending spawner)
    spawnEvent(ev){
      if(ev.kind==='wave'){
        this.pending.push({ etype:ev.etype, left:ev.n, gap:ev.gap, accDist:0, yf:ev.yf, hp:ev.hp });
      } else if(ev.kind==='terrain'){
        const w = Math.max(6, cell);
        const cols = Math.max(2, Math.round(ev.len / w));
        const sample = (arr, i) => { const f = i/(cols-1)*(arr.length-1); const a=arr[Math.floor(f)], b=arr[Math.min(arr.length-1, Math.ceil(f))]; return a + (b-a)*(f-Math.floor(f)); };
        for(let i=0;i<cols;i++){
          this.terrain.push({ wx: this.camX + lcdW + i*w, w,
            topH: Math.round(sample(ev.top, i) * this.h),
            botH: Math.round(sample(ev.bot, i) * this.h) });
        }
      } else if(ev.kind==='turret'){
        const w = Math.max(7, Math.round(cell*0.7)), hh = Math.max(6, Math.round(cell*0.6));
        const y = ev.side==='bot' ? this.bottom - hh : this.top;
        this.enemies.push({ type:'turret', side:ev.side, wx: this.camX + lcdW, x: lcdW, y, baseY:y,
          w, h:hh, hp: ev.hp, vx:0, fireAt: ev.fireMs, fireT: Math.random()*ev.fireMs, alive:true });
      } else if(ev.kind==='powerup'){
        this.powerups.push({ x: lcdW, y: this.yOf(ev.yf), vx:-1.0, kind: ev.pkind });
      } else if(ev.kind==='boss'){
        this.pendingBoss = ev.boss;
      }
    },
    // emit one enemy from a pending wave spawner
    emitEnemy(p){
      const lvlMul = 1 + 0.16*this.levelIdx;
      const y0 = this.yOf(p.yf);
      if(p.etype==='diver'){
        this.enemies.push({ type:'diver', x: lcdW, y: this.top + 2, baseY:this.top+2, w: Math.max(6, Math.round(cell*0.6)), h: Math.max(5, Math.round(cell*0.45)),
          hp: 1, vx: -(1.0 + 0.2*lvlMul + Math.random()*0.3), dvy: 1.1 + 0.15*this.levelIdx, locked:false, vy:0,
          fireAt: 99999, fireT: 0 });
      } else {
        const sine = p.etype==='sine';
        const med = (p.hp||1) >= 2;
        const w = med ? Math.max(9, Math.round(cell*0.85)) : Math.max(6, Math.round(cell*0.6));
        const hh = med ? Math.max(7, Math.round(cell*0.65)) : Math.max(5, Math.round(cell*0.45));
        this.enemies.push({ type: p.etype, x: lcdW, y: y0, baseY: y0, w, h: hh, size: med?'med':'small',
          hp: p.hp || 1, vx: -(0.6 + 0.18*lvlMul + Math.random()*0.4),
          amp: sine ? 6 + Math.random()*10 : 0, freq: 0.004 + Math.random()*0.004, phase: Math.random()*6.28,
          fireAt: 700 + Math.random()*1400, fireT: 0 });
      }
    },
    fire(){
      const cx = this.shipX + this.shipW, cy = this.shipY + Math.round(this.shipH/2), spd = 3.4;
      const W = this.weapon, push = (y,vy) => this.bullets.push({ x:cx, y, vx:spd, vy });
      if(W===1){ push(cy,0); }
      else if(W===2){ push(cy-2,0); push(cy+2,0); }
      else if(W===3){ push(cy,0); push(cy-3,0); push(cy+3,0); }
      else { push(cy,0); push(cy-2,-0.5); push(cy+2,0.5); push(cy-4,-1.0); push(cy+4,1.0); }
      beep(880, 0.03, 0.03);
    },
    hitShip(){
      if(this.invuln > 0 || this.over) return;
      this.lives--; beep(140, 0.16, 0.05);
      this.weapon = Math.max(1, this.weapon-1); // decay one step, don't reset
      if(this.lives <= 0){ this.die(); return; }
      this.invuln = 1400; // brief respawn grace
      this.shipY = this.recenterY();
      this.eBullets = []; // clear the air so respawn isn't instant death
    },
    // respawn at the widest local terrain opening so we aren't reborn in rock
    recenterY(){
      const col = this.terrainColAtShip();
      if(!col) return this.top + Math.round(this.h/2);
      const openTop = this.top + col.topH, openBot = this.bottom - col.botH;
      return Math.round((openTop + openBot)/2 - this.shipH/2);
    },
    crash(){ this.hitShip(); },
    die(){
      this.over = true; beep(90, 0.3, 0.06);
      this.submitScore();
    },
    win(){
      this.over = true; this.won = true; beep(1200, 0.18, 0.05);
      this.submitScore();
    },
    submitScore(){
      if(this.score > DB.spaceimpact.hi){ DB.spaceimpact.hi = this.score; saveDB(); }
      try { window.parent !== window && window.parent.postMessage(
        { type:'ourcade:score', gameId:'space-impact', score:this.score }, '*'); } catch(e){}
    },
    // the terrain column the (fixed-X) ship currently overlaps, or null
    terrainColAtShip(){
      const wx = this.shipX + this.camX;
      for(const c of this.terrain){ if(wx + this.shipW > c.wx && wx < c.wx + c.w) return c; }
      return null;
    },
    // ── simulation ───────────────────────────────────────────────────────
    tick(dt){
      if(this.over){ this.t += dt; return; }
      if(this.paused) return;
      dt = Math.min(dt, 60); // clamp big frame gaps
      this.t += dt;
      if(this.invuln > 0) this.invuln -= dt;
      if(this.bannerT > 0) this.bannerT -= dt;

      // auto-fire (only live during the fight, not the boss explosion)
      if(!(this.boss && this.boss.dying != null)){
        this.fireAcc += dt;
        while(this.fireAcc >= 220){ this.fireAcc -= 220; this.fire(); }
      }

      // advance the world. scroll is frozen once we enter the boss arena.
      if(this.phase === 'scroll'){
        this.lastCamX = this.camX;
        this.camX += this.scrollSpd*dt*0.06;
        const camDelta = this.camX - this.lastCamX;
        // frontier spawner: fire events as their map-X crosses the right edge
        const lvl = SI_LEVELS[this.levelIdx], frontier = this.camX + lcdW;
        while(this.evIdx < lvl.events.length && lvl.events[this.evIdx].at <= frontier){
          this.spawnEvent(lvl.events[this.evIdx]); this.evIdx++;
        }
        // pending waves emit one enemy every `gap` world-px
        for(const p of this.pending){
          p.accDist += camDelta;
          while(p.left > 0 && p.accDist >= p.gap){ p.accDist -= p.gap; p.left--; this.emitEnemy(p); }
        }
        this.pending = this.pending.filter(p => p.left > 0);
        // cull terrain that has scrolled fully off the left
        this.terrain = this.terrain.filter(c => c.wx + c.w - this.camX > 0);
        // level events exhausted + screen cleared -> head to the boss
        if(this.evIdx >= lvl.events.length && this.pending.length === 0 &&
           this.enemies.length === 0 && this.terrain.length === 0){
          this.phase = 'clear';
        }
      } else if(this.phase === 'clear'){
        // brief settle before the boss; clear lingering threats
        if(this.enemies.length === 0 && this.eBullets.length === 0){
          this.spawnBoss();
        }
      }

      // player bullets
      for(const b of this.bullets){ b.x += b.vx*dt*0.06; b.y += (b.vy||0)*dt*0.06; }
      this.bullets = this.bullets.filter(b => b.x < lcdW + 4 && b.y > this.top-6 && b.y < this.bottom+6);

      // enemies (per-type motion + fire)
      for(const e of this.enemies){
        (SI.enemyUpdate[e.type] || SI.enemyUpdate.straight)(e, this, dt);
        e.fireT += dt;
        if(e.fireT >= e.fireAt && e.x < lcdW*0.94 && e.type !== 'diver'){ e.fireT = 0; SI.enemyFire(e, this); }
      }
      this.enemies = this.enemies.filter(e => (e.type==='turret' ? e.alive : (e.x + e.w > 0)) && e.y < this.bottom + 30);

      // boss
      if(this.boss) this.updateBoss(dt);

      // enemy bullets
      for(const eb of this.eBullets){ eb.x += eb.vx*dt*0.06; eb.y += (eb.vy||0)*dt*0.06; }
      this.eBullets = this.eBullets.filter(eb => eb.x > -4 && eb.x < lcdW+4 && eb.y > this.top-6 && eb.y < this.bottom+6);

      // powerups drift left
      for(const p of this.powerups){ p.x += p.vx*dt*0.06; }
      this.powerups = this.powerups.filter(p => p.x + 6 > 0);

      // explosion fx
      for(const f of this.fx){ f.t += dt; }
      this.fx = this.fx.filter(f => f.t < f.life);

      this.collisions();
    },
    spawnBoss(){
      const def = SI_BOSSES[this.pendingBoss];
      const w = Math.max(18, Math.round(lcdW*def.wf)), h = Math.max(16, Math.round(this.h*def.hf));
      const baseY = this.top + Math.round((this.h - h)/2);
      this.boss = { name:this.pendingBoss, w, h, hp:def.hp, maxHp:def.hp, def,
        x: lcdW, homeX: Math.round(lcdW*def.enterTo), baseY, y: baseY,
        range: Math.max(6, Math.round((this.h - h)/2 - 2)), phase: Math.random()*6.28,
        entering:true, fireT:0, flash:0, dying:null, phaseIdx:0 };
      // make the arena winnable + give the player a clean entrance
      this.weapon = Math.max(2, this.weapon); this.eBullets = []; this.enemies = [];
      this.phase = 'boss'; this.banner = 'WARNING'; this.bannerT = 1400; beep(180, 0.4, 0.05);
    },
    updateBoss(dt){
      const b = this.boss;
      if(b.dying != null){
        b.dying += dt;
        if(b.dying >= 600){ this.boss = null; this.nextLevel(); }
        return;
      }
      if(b.entering){
        b.x -= 1.6*dt*0.06;
        if(b.x <= b.homeX){ b.x = b.homeX; b.entering = false; }
        return;
      }
      if(b.flash > 0) b.flash -= dt;
      // phase by HP band: 0 (100-75) .. 3 (25-0)
      const pct = b.hp / b.maxHp;
      const idx = pct > 0.75 ? 0 : pct > 0.5 ? 1 : pct > 0.25 ? 2 : 3;
      if(idx !== b.phaseIdx){ b.phaseIdx = idx; b.flash = 200; beep(220, 0.18, 0.05); }
      const phase = b.def.phases[idx];
      (SI.bossMove[phase.move] || SI.bossMove.hover)(b, this, dt);
      b.fireT += dt;
      if(b.fireT >= phase.fireMs){ b.fireT = 0; (SI.bossFire[phase.fire] || SI.bossFire.spread3)(b, this); }
    },
    killBoss(){
      const b = this.boss; b.dying = 0; this.score += 250; beep(70, 0.5, 0.06);
      // a bounded explosion: a few expanding rect rings centered on the boss
      const cx = b.x + (b.w>>1), cy = b.y + (b.h>>1);
      for(let i=0;i<6;i++) this.fx.push({ x:cx, y:cy, t:-i*70, life:520, r:2 + i*3 });
    },
    collisions(){
      const sx=this.shipX, sy=this.shipY, sw=this.shipW, sh=this.shipH;
      const overlap = (ax,ay,aw,ah, bx,by,bw,bh) =>
        ax < bx+bw && ax+aw > bx && ay < by+bh && ay+ah > by;

      // player bullets vs enemies + boss
      for(const b of this.bullets){
        if(b.dead) continue;
        for(const e of this.enemies){
          if(e.hp <= 0) continue;
          if(overlap(b.x,b.y,3,2, e.x,e.y,e.w,e.h)){
            b.dead = true; e.hp--;
            if(e.hp <= 0){
              e.dead = true;
              this.score += e.type==='turret' ? 30 : (e.size==='med' ? 20 : 10);
              beep(660, 0.05, 0.04);
              if(e.type!=='turret' && Math.random() < 0.07) this.powerups.push({ x:e.x, y:e.y, vx:-1.0, kind:'P' });
            }
            break;
          }
        }
        if(!b.dead && this.boss && this.boss.dying == null && !this.boss.entering &&
           overlap(b.x,b.y,3,2, this.boss.x,this.boss.y,this.boss.w,this.boss.h)){
          b.dead = true; this.boss.hp--; this.boss.flash = 120; beep(520, 0.03, 0.03);
          if(this.boss.hp <= 0) this.killBoss();
        }
      }
      this.bullets = this.bullets.filter(b => !b.dead);
      this.enemies = this.enemies.filter(e => !e.dead);

      // ship vs powerups
      for(const p of this.powerups){
        if(overlap(sx,sy,sw,sh, p.x-3,p.y-3,8,8)){
          p.dead = true;
          if(p.kind==='P'){ this.weapon = Math.min(4, this.weapon+1); this.score += 5; beep(1046, 0.08, 0.05); showToast('WEAPON UP'); }
          else if(p.kind==='1'){ this.lives++; beep(1318, 0.12, 0.05); showToast('EXTRA LIFE'); }
          else { this.score += 50; beep(1046, 0.06, 0.05); showToast('BONUS'); }
        }
      }
      this.powerups = this.powerups.filter(p => !p.dead);

      if(this.over) return;
      // ship vs terrain (O(1) column lookup; ship X is fixed)
      const col = this.terrainColAtShip();
      if(col && (sy < this.top + col.topH || sy + sh > this.bottom - col.botH)) this.crash();
      // ship vs enemies / boss / enemy bullets
      if(!this.over) for(const e of this.enemies){ if(overlap(sx,sy,sw,sh, e.x,e.y,e.w,e.h)){ this.hitShip(); break; } }
      if(!this.over && this.boss && this.boss.dying == null && overlap(sx,sy,sw,sh, this.boss.x,this.boss.y,this.boss.w,this.boss.h)) this.hitShip();
      if(!this.over) for(const eb of this.eBullets){ if(overlap(sx,sy,sw,sh, eb.x-2,eb.y-1,4,2)){ eb.dead=true; this.hitShip(); break; } }
      this.eBullets = this.eBullets.filter(eb => !eb.dead);
    },
    // ── input ────────────────────────────────────────────────────────────
    up(){ if(!this.paused && !this.over) this.shipY = Math.max(this.top, this.shipY - Math.round(cell*0.7)); },
    down(){ if(!this.paused && !this.over) this.shipY = Math.min(this.bottom - this.shipH, this.shipY + Math.round(cell*0.7)); },
    key(ch){ if(ch==='2') this.up(); else if(ch==='8') this.down(); else if(ch==='5') this.navi(); },
    navi(){ if(this.over) this.start(); else this.paused = !this.paused; },
    back(){ popScreen(); },
    tap(){ this.navi(); },
    // ── render ───────────────────────────────────────────────────────────
    render(){
      // HUD: score left, lives as pips right
      drawStatusBar(String(this.score).padStart(5,'0'));
      const pipR = Math.max(2, fs);
      for(let i=0;i<this.lives;i++){
        ctx.fillStyle = ink;
        ctx.fillRect(lcdW - pad - (i+1)*(pipR*2+2), statusH + 2, pipR*2, pipR);
      }
      // terrain (behind everything)
      ctx.fillStyle = ink;
      for(const c of this.terrain){
        const sx = Math.round(c.wx - this.camX);
        if(sx + c.w < 0 || sx > lcdW) continue;
        if(c.topH > 0) ctx.fillRect(sx, this.top, c.w, c.topH);
        if(c.botH > 0) ctx.fillRect(sx, this.bottom - c.botH, c.w, c.botH);
      }
      // powerups (hollow box; glyph by kind)
      for(const p of this.powerups){
        if(p.kind==='1' && !blinkOn()) continue; // 1UP blinks to read as rare
        ctx.fillStyle = ink; ctx.fillRect(Math.round(p.x)-3, Math.round(p.y)-3, 8, 8);
        ctx.fillStyle = bg; ctx.fillRect(Math.round(p.x)-2, Math.round(p.y)-2, 6, 6);
        drawText(p.kind, Math.round(p.x)-1, Math.round(p.y)-3, 1, ink);
      }
      // enemies (per type)
      for(const e of this.enemies) SI.drawEnemy(e);
      // boss
      if(this.boss){
        const b = this.boss, bx = Math.round(b.x), by = Math.round(b.y);
        if(b.dying != null){
          // bounded explosion: expanding rings centered on the boss
          for(const f of this.fx){ if(f.t < 0) continue; const r = Math.round(f.r + f.t*0.03);
            ctx.fillStyle = (Math.floor(f.t/60)%2===0) ? ink : bg;
            ctx.fillRect(Math.round(f.x)-r, Math.round(f.y)-r, r*2, r*2); }
        } else {
          const flashing = b.flash > 0 && blinkOn();
          ctx.fillStyle = flashing ? bg : ink; ctx.fillRect(bx, by, b.w, b.h);
          ctx.fillStyle = flashing ? ink : bg; ctx.fillRect(bx+2, by + (b.h>>1) - 2, 4, 4); // core weak-point
          ctx.fillStyle = flashing ? ink : bg; ctx.fillRect(bx, by + (b.h>>2), 2, 3); ctx.fillRect(bx, by + b.h - (b.h>>2) - 3, 2, 3); // guns
        }
      }
      // ship (blink during invulnerability)
      if(!(this.invuln > 0 && Math.floor(this.t/120)%2===0)){
        ctx.fillStyle = ink;
        const sx=this.shipX, sy=this.shipY, sw=this.shipW, sh=this.shipH;
        ctx.fillRect(sx, sy + Math.round(sh*0.3), sw, Math.round(sh*0.4)); // body
        ctx.fillRect(sx + sw - 2, sy, 2, sh);                              // nose
        ctx.fillRect(sx, sy, 2, sh);                                       // tail
      }
      // bullets
      ctx.fillStyle = ink;
      for(const b of this.bullets) ctx.fillRect(Math.round(b.x), Math.round(b.y), 3, 2);
      for(const eb of this.eBullets) ctx.fillRect(Math.round(eb.x), Math.round(eb.y), 2, 2);
      // weapon level chip (top-left under status)
      drawText('W'+this.weapon, this.shipX, this.top, 1, ink);
      // transient banner (LEVEL n / WARNING)
      if(this.bannerT > 0 && !this.paused && !this.over) drawTextCentered(this.banner, this.top + Math.round(this.h*0.35), fs+1, ink);
      if(this.paused) overlayBox([{t:'PAUSED',s:fs+1},{t:'CENTER RESUMES',s:fs,blink:true}]);
      else if(this.over) overlayBox(this.won
        ? [{t:'YOU WIN',s:fs+1},{t:'SCORE '+this.score,s:fs},{t:'HI '+DB.spaceimpact.hi,s:fs},{t:'CENTER RETRY',s:fs,blink:true}]
        : [{t:'GAME OVER',s:fs+1},{t:'SCORE '+this.score,s:fs},{t:'HI '+DB.spaceimpact.hi,s:fs},{t:'CENTER RETRY',s:fs,blink:true}]);
    }
  };

  function blockH(b){ return b.type==='space' ? 5*fs : b.type==='applet' ? 14*fs : b.type==='link' ? (8*fs+2) : ((b.s?fs+1:fs)*8+2); }
  const Browser = {
    id:'services', statusLeft:'OURCADE', page:'home', focus:0, scroll:0, loadT:0,
    get soft(){ return this.loadT>0 ? '' : 'Open'; },
    enter(){ this.page='home'; this.focus=0; this.scroll=0; this.loadT=500; },
    tick(dt){ if(this.loadT>0) this.loadT-=dt; },
    def(){ return PAGES[this.page]; },
    focusables(){ const f=[]; this.def().blocks.forEach((b,i)=>{ if(b.type==='link'||b.type==='applet') f.push(i); }); return f; },
    up(){ const f=this.focusables(); if(f.length){ this.focus=(this.focus+f.length-1)%f.length; click(); } },
    down(){ const f=this.focusables(); if(f.length){ this.focus=(this.focus+1)%f.length; click(); } },
    navi(){
      if(this.loadT>0) return;
      const f=this.focusables(), b=this.def().blocks[f[this.focus]]; if(!b) return;
      if(b.type==='applet'){ SnakeApp.start('web'); pushScreen(SnakeApp); }
      else if(b.type==='link'){ this.go(b.go); }
    },
    go(id){ if(PAGES[id]){ this.page=id; this.focus=0; this.scroll=0; this.loadT=400; click(); } },
    back(){ if(this.page!=='home') this.go('home'); else popScreen(); },
    key(ch){ if(ch==='2')this.up(); else if(ch==='8')this.down(); else if(ch==='5')this.navi(); else click(); },
    render(){
      const p=this.def(), barH=9*fs;
      ctx.fillStyle=ink; ctx.fillRect(0,statusH,lcdW,barH);
      drawText(p.url, pad, statusH+Math.round((barH-7*fs)/2), fs, bg);
      const top=statusH+barH+3, bottom=contentBottom();
      if(this.loadT>0){ drawTextCentered('LOADING...', top+12*fs, fs, ink); return; }
      const f=this.focusables(), focusIdx=f[this.focus];
      const pos=[]; let yy=0;
      p.blocks.forEach(b=>{ pos.push({y:yy,h:blockH(b)}); yy+=blockH(b); });
      if(focusIdx!=null){ const fy=pos[focusIdx].y, fh=pos[focusIdx].h;
        if(fy-this.scroll<0) this.scroll=fy; else if(fy+fh-this.scroll>(bottom-top)) this.scroll=fy+fh-(bottom-top); }
      this.scroll=Math.max(0, Math.min(this.scroll, Math.max(0, yy-(bottom-top))));
      ctx.save(); ctx.beginPath(); ctx.rect(0,top,lcdW,bottom-top); ctx.clip();
      p.blocks.forEach((b,i)=>{ const y=top+pos[i].y-this.scroll; if(y>bottom||y+pos[i].h<top) return; drawBlock(b, y, i===focusIdx); });
      ctx.restore();
    }
  };
  function drawBlock(b, y, focused){
    if(b.type==='text'){ const s=b.s?fs+1:fs; drawText(b.t, pad, y, s, ink); }
    else if(b.type==='link'){
      const label='> '+b.label;
      if(focused){ ctx.fillStyle=ink; ctx.fillRect(pad-1,y-1,lcdW-2*(pad-1),8*fs+1); drawText(label,pad+2,y,fs,bg); }
      else drawText(label,pad+2,y,fs,ink);
    } else if(b.type==='applet'){
      const h=14*fs, x=pad+2, w=lcdW-2*pad-4;
      ctx.strokeStyle=ink; ctx.lineWidth=Math.max(1, fs*(focused?1.2:0.6)); ctx.strokeRect(x+0.5,y+0.5,w,h-4);
      drawTextCentered('SNAKE.APP', y+3*fs, fs, ink);
      if(!(focused && !blinkOn())) drawTextCentered('> PLAY', y+8*fs, fs, ink);
    }
  }

  /* ----- Composer ----- */
  const ComposerApp = {
    id:'composer', statusLeft:'OURCADE', seq:[], presetIdx:0,
    get soft(){ return 'Play'; },
    enter(){ this.seq = (DB.composer && DB.composer.length) ? DB.composer.slice() : []; },
    key(ch){
      if(NOTE_KEYS[ch]){ const n=NOTE_KEYS[ch]; playNote(n,0.18); this.seq.push(n); if(this.seq.length>96) this.seq.shift(); DB.composer=this.seq.slice(); saveDB(); }
      else if(ch==='*'){ this.seq=[]; DB.composer=[]; saveDB(); showToast('CLEARED'); }
      else if(ch==='#'){ const p=PRESETS[this.presetIdx%PRESETS.length]; this.presetIdx++; this.seq=p.seq.slice(); DB.composer=this.seq.slice(); saveDB(); showToast(p.name); }
      else click();
    },
    navi(){ playSeq(this.seq); },
    back(){ if(this.seq.length){ this.seq.pop(); DB.composer=this.seq.slice(); saveDB(); } else popScreen(); },
    render(){
      drawTextCentered('COMPOSER', contentTop(), fs, ink);
      const tail = this.seq.slice(-48).join(' ');
      drawWrapped(tail, contentTop()+11*fs, fs, contentBottom()-9*fs);
      drawTextCentered('1-0 NOTES  * CLR  # TUNE', contentBottom()-7*fs, fs, ink);
    }
  };

  /* ----- Messages + Names ----- */
  const MTAP = {'1':'.,?!1','2':'abc2','3':'def3','4':'ghi4','5':'jkl5','6':'mno6','7':'pqrs7','8':'tuv8','9':'wxyz9','0':' 0'};
  const Editor = {
    id:'editor', statusLeft:'OURCADE', text:'', caseMode:1, pk:null, pidx:0, pt:0, preTo:null,
    get soft(){ return 'Send'; },
    tick(){ if(this.pk && performance.now()-this.pt>850) this.pk=null; },
    applyCase(c, replacing){
      if(!/[a-z]/i.test(c)) return c;
      if(this.caseMode===2) return c.toUpperCase();
      if(this.caseMode===0) return c.toLowerCase();
      const prev = replacing ? this.text.slice(0,-1) : this.text;
      const lastCh = prev.slice(-1);
      return (prev.length===0 || lastCh===' ') ? c.toUpperCase() : c.toLowerCase();
    },
    key(ch){
      const now = performance.now(); click();
      if(MTAP[ch]){
        const set = MTAP[ch];
        if(this.pk===ch && (now-this.pt)<850){ this.pidx=(this.pidx+1)%set.length; this.text=this.text.slice(0,-1)+this.applyCase(set[this.pidx], true); }
        else { this.pk=ch; this.pidx=0; this.text += this.applyCase(set[0], false); }
        this.pt = now;
      } else if(ch==='#'){ this.caseMode=(this.caseMode+1)%3; this.pk=null; }
      else if(ch==='*'){ this.pk=null; this.text += '?'; }
    },
    navi(){
      if(!this.text.trim()){ showToast('EMPTY'); return; }
      if(this.preTo){ sendTo(this.preTo, this.text); }
      else openRecipientPicker(this.text);
    },
    back(){ if(this.text){ this.text=this.text.slice(0,-1); this.pk=null; } else popScreen(); },
    render(){
      drawTextCentered('WRITE MSG', contentTop(), fs, ink);
      const p = drawWrapped(this.text, contentTop()+11*fs, fs, contentBottom()-9*fs);
      if(blinkOn()){ ctx.fillStyle=ink; ctx.fillRect(p.x, p.y, 5*fs, 7*fs); }
      const modes=['abc','Abc','ABC'];
      drawText(modes[this.caseMode], pad, contentBottom()-7*fs, fs, ink);
      const cc=''+this.text.length; drawText(cc, lcdW-pad-textW(cc,fs), contentBottom()-7*fs, fs, ink);
    }
  };
  function openEditor(preTo){ Editor.text=''; Editor.caseMode=1; Editor.pk=null; Editor.preTo=preTo||null; pushScreen(Editor); }

  // A reusable digit-entry screen (dialer-style). title shown up top; onDone gets
  // the typed string when the soft key (softLabel) is pressed.
  function makeNumberEntry(title, softLabel, onDone){
    return {
      id:'numentry', statusLeft:'OURCADE', buf:'',
      get soft(){ return softLabel; },
      enter(){ this.buf=''; },
      key(ch){ if(/[0-9*#]/.test(ch) && this.buf.length<20){ this.buf+=ch; dtmf(ch); } },
      navi(){ if(this.buf) onDone(this.buf); else showToast('ENTER NUMBER'); },
      back(){ if(this.buf) this.buf=this.buf.slice(0,-1); else popScreen(); },
      render(){
        drawTextCentered(title, contentTop(), fs, ink);
        const midY = statusH + Math.round((lcdH-statusH-softH)/2) - 3*fs;
        if(this.buf) drawTextCentered(this.buf, midY, fs+2, ink);
        else if(blinkOn()) drawTextCentered('ENTER NUMBER', midY+2*fs, fs, ink);
      }
    };
  }
  // A reusable T9 text-entry screen (uses the same multi-tap as Editor). onDone
  // gets the typed text when the soft key is pressed.
  function makeTextEntry(title, softLabel, onDone){
    return {
      id:'textentry', statusLeft:'OURCADE', text:'', caseMode:1, pk:null, pidx:0, pt:0,
      get soft(){ return softLabel; },
      enter(){ this.text=''; this.caseMode=1; this.pk=null; },
      tick(){ if(this.pk && performance.now()-this.pt>850) this.pk=null; },
      key(ch){
        const now=performance.now(); click();
        if(MTAP[ch]){
          const set=MTAP[ch];
          if(this.pk===ch && (now-this.pt)<850){ this.pidx=(this.pidx+1)%set.length; this.text=this.text.slice(0,-1)+Editor.applyCase.call(this,set[this.pidx],true); }
          else { this.pk=ch; this.pidx=0; this.text+=Editor.applyCase.call(this,set[0],false); }
          this.pt=now;
        } else if(ch==='#'){ this.caseMode=(this.caseMode+1)%3; this.pk=null; }
      },
      navi(){ if(this.text.trim()) onDone(this.text.trim()); else showToast('EMPTY'); },
      back(){ if(this.text){ this.text=this.text.slice(0,-1); this.pk=null; } else popScreen(); },
      render(){
        drawTextCentered(title, contentTop(), fs, ink);
        const p=drawWrapped(this.text, contentTop()+11*fs, fs, contentBottom()-9*fs);
        if(blinkOn()){ ctx.fillStyle=ink; ctx.fillRect(p.x, p.y, 5*fs, 7*fs); }
        const modes=['abc','Abc','ABC'];
        drawText(modes[this.caseMode], pad, contentBottom()-7*fs, fs, ink);
      }
    };
  }
  // Send `body` to a typed recipient, then unwind back to the messages menu. The
  // authoritative result (and any "NOT DELIVERED") arrives via nopia:sendresult.
  function sendTo(addr, body){ Transport.send(addr, body); showToast('SENDING…'); popToMessages(); }
  function popToMessages(){ while(cur() && cur().id!=='messages' && screenStack.length>1) popScreen(); }
  function openRecipientPicker(body){
    pushScreen(ListScreen({ id:'pickto', title:'SEND TO', numbered:false, items:()=>{
      const items = [{ label:'> ENTER NUMBER', run:()=>{
        pushScreen(makeNumberEntry('SEND TO', 'Send', (num)=>{ sendTo(num, body); }));
      }}];
      for(const c of allContacts()) items.push({ label:c.name, run:()=>{ sendTo(c.addr, body); } });
      return items;
    }}));
  }
  const MessagesMenu = ListScreen({ id:'messages', title:'MESSAGES', numbered:true, items:()=>{
    const unread = DB.messages.filter(m=>m.folder==='inbox'&&!m.read).length;
    const items = [
      {label:'INBOX'+(unread?(' ('+unread+')'):''), run:()=>pushScreen(makeFolder('inbox','INBOX'))},
      {label:'WRITE MESSAGE', run:()=>openEditor(null)},
      {label:'SENT', run:()=>pushScreen(makeFolder('sent','SENT'))}
    ];
    // Personal mode only: wipe this account's cloud inbox/sent (start fresh).
    if(PERSONAL) items.push({label:'CLEAR MESSAGES', run:()=>{ postToParent({ type:'nopia:clearmessages' }); showToast('CLEARING…'); }});
    return items;
  }});
  function makeFolder(folder, title){
    return ListScreen({ id:'folder', title, numbered:false, items:()=>{
      const msgs = DB.messages.filter(m=>m.folder===folder).slice().reverse();
      if(!msgs.length) return [{label:'(EMPTY)', run:()=>{}}];
      return msgs.map(m=>({ label:(folder==='inbox'?contactName(m.from):contactName(m.to))+': '+m.body.slice(0,12),
        run:()=>{ if(!m.read){ m.read=true; saveDB(); if(PERSONAL) postToParent({ type:'nopia:read', msgId:m.id }); } pushScreen(makeMsgView(m, folder)); } }));
    }});
  }
  function makeMsgView(m, folder){
    return {
      id:'msgview', statusLeft:'OURCADE',
      get soft(){ return 'Reply'; },
      navi(){ openEditor(folder==='inbox'?m.from:m.to); },
      back(){ popScreen(); },
      render(){
        const who = (folder==='inbox'?'FROM ':'TO ') + (folder==='inbox'?contactName(m.from):contactName(m.to));
        drawText(who, pad, contentTop(), fs, ink);
        drawWrapped(m.body, contentTop()+11*fs, fs, contentBottom());
      }
    };
  }
  // Add a contact: type a number, then a name. In personal mode the parent
  // persists it (and it comes back via nopia:contacts); we optimistically show it.
  function startAddContact(){
    pushScreen(makeNumberEntry('NEW NUMBER', 'Next', (num)=>{
      pushScreen(makeTextEntry('NAME', 'Save', (name)=>{
        if(PERSONAL){
          postToParent({ type:'nopia:addcontact', name, number:num });
          if(!SYNCED.some(c=>c.number===num)) SYNCED.push({ name, number:num });
        } else {
          if(!DB.contacts.some(c=>c.addr===num)){ DB.contacts.push({ name, addr:num }); saveDB(); }
        }
        showToast('SAVED'); popScreen(); popScreen();
      }));
    }));
  }
  const NamesScreen = ListScreen({ id:'names', title:'NAMES', numbered:false, soft:'Write', items:()=>{
    const items = [{ label:'+ ADD CONTACT', run:()=>startAddContact() }];
    for(const c of allContacts()) items.push({ label:c.name+' '+c.addr, run:()=>openEditor(c.addr) });
    return items;
  }});

  /* ----- Profiles / Settings / Clock ----- */
  const ProfilesScreen = ListScreen({ id:'profiles', title:'PROFILES', numbered:false, items:()=>
    ['GENERAL','SILENT','MEETING','OUTDOOR'].map(p=>({ label:(DB.settings.profile===p?'* ':'  ')+p, run:()=>{ DB.settings.profile=p; saveDB(); showToast(p); } }))
  });
  const SettingsScreen = ListScreen({ id:'settings', title:'SETTINGS', numbered:false, items:()=>[
    {label:'SOUND '+(DB.settings.soundOn?'ON':'OFF'), run:()=>{ DB.settings.soundOn=!DB.settings.soundOn; saveDB(); }},
    {label:'KEYPAD TONES '+(DB.settings.keypadTones?'ON':'OFF'), run:()=>{ DB.settings.keypadTones=!DB.settings.keypadTones; saveDB(); }},
    {label:'RINGTONE', run:()=>playRingtone()},
    {label:'MAZE '+(DB.settings.maze?'ON':'OFF'), run:()=>{ DB.settings.maze=!DB.settings.maze; saveDB(); }},
    {label:'CLOCK '+(DB.settings.clock24?'24H':'12H'), run:()=>{ DB.settings.clock24=!DB.settings.clock24; saveDB(); }},
    {label:'RESTORE FACTORY', run:()=>{ factoryReset(); showToast('DONE'); }}
  ]});
  const ClockApp = {
    id:'clock', statusLeft:'OURCADE',
    get soft(){ return ''; },
    back(){ popScreen(); },
    render(){
      const y = statusH + Math.round((lcdH-statusH-softH)*0.32);
      drawTextCentered(clockStr(), y, fs+3, ink);
      const d = new Date(), ds = ['SUN','MON','TUE','WED','THU','FRI','SAT'][d.getDay()];
      drawTextCentered(ds+' '+(d.getMonth()+1)+'/'+d.getDate(), y+22*fs, fs, ink);
    }
  };

  /* ====================================================================
     MAIN LOOP + INPUT WIRING
     ==================================================================== */
  function frame(ts){
    if(!last) last = ts;
    const dt = ts - last; last = ts;
    if(toastT>0){ toastT-=dt; if(toastT<=0) toast=null; }
    const s = cur();
    if(s.tick) s.tick(dt);
    clearLCD();
    const showChrome = (s.statusBar !== false);
    if(showChrome) drawStatusBar();
    if(s.render) s.render(dt);
    if(showChrome){ const lbl = softLabelOf(s); if(lbl) drawSoftBar(lbl); }
    if(toast) drawToast(toast);
    requestAnimationFrame(frame);
  }

  // keyboard
  window.addEventListener('keydown', e=>{
    ensureYT();
    const k = e.key.toLowerCase();
    if(['arrowup','arrowdown','arrowleft','arrowright',' '].includes(k)) e.preventDefault();
    if(/^[0-9*#]$/.test(e.key)){ pressDigit(e.key); return; }
    if(k==='arrowup'||k==='w') doScroll('up');
    else if(k==='arrowdown'||k==='s') doScroll('down');
    else if(k==='arrowleft'||k==='a') setDir('left');
    else if(k==='arrowright'||k==='d') setDir('right');
    else if(k==='enter'||k===' ') naviPress();
    else if(k==='escape'||k==='backspace') phonePress();
  });

  // on-screen buttons
  function bindPress(el, fn){
    if(!el) return;
    const down = (e)=>{ e.preventDefault(); ensureYT(); el.classList.add('pressed'); fn(); };
    const up = ()=> el.classList.remove('pressed');
    el.addEventListener('touchstart', down, {passive:false});
    el.addEventListener('touchend', up);
    el.addEventListener('touchcancel', up);
    el.addEventListener('mousedown', down);
    el.addEventListener('mouseup', up);
    el.addEventListener('mouseleave', up);
  }
  bindPress(document.getElementById('upKey'), ()=>doScroll('up'));
  bindPress(document.getElementById('dnKey'), ()=>doScroll('down'));
  bindPress(document.getElementById('phoneKey'), phonePress);
  bindPress(document.getElementById('callKey'), naviPress);
  document.querySelectorAll('.num').forEach(b=>{
    const k = b.dataset.key, ch = k==='star'?'*':(k==='hash'?'#':k);
    bindPress(b, ()=>pressDigit(ch));
  });

  // swipe + tap on the screen
  let tStart=null;
  canvas.addEventListener('touchstart', e=>{ ensureYT(); const t=e.touches[0]; tStart={x:t.clientX,y:t.clientY}; }, {passive:true});
  canvas.addEventListener('touchend', e=>{
    if(!tStart) return;
    const t=e.changedTouches[0], dx=t.clientX-tStart.x, dy=t.clientY-tStart.y;
    const adx=Math.abs(dx), ady=Math.abs(dy);
    if(adx<14 && ady<14){ screenTap(); tStart=null; return; }
    if(adx>ady) setDir(dx>0?'right':'left'); else setDir(dy>0?'down':'up');
    tStart=null;
  }, {passive:true});
  canvas.addEventListener('click', ()=>{ ensureYT(); if(!('ontouchstart' in window)) screenTap(); });

  window.addEventListener('resize', layout);

  /* ---------- personal-mode bridge (parent ⇄ phone over postMessage) ----------
     Only active when embedded with ?personal=1. The parent (PhoneProvider, via
     PhonePage) owns the Firebase listeners and relays: identity once, then
     inbox/sent snapshots (full-replace of that partition) and single live
     'incoming' rings. Texting is open — no request/accept gate. */
  function tsOf(m){ const t=m && m.ts; if(!t) return Date.now(); if(typeof t==='number') return t; if(t.seconds) return t.seconds*1000; if(t.toMillis) return t.toMillis(); return Date.now(); }
  function mapInbox(m){ const addr=m.fromNumber||m.from; if(m.fromName) NAMELABELS[addr]=m.fromName; return { id:m.id, from:addr, to:(IDENTITY&&IDENTITY.number)||uid(), body:m.body, ts:tsOf(m), folder:'inbox', read:!!m.read }; }
  function mapSent(m){ const addr=m.toNumber||m.to; if(m.toName) NAMELABELS[addr]=m.toName; return { id:m.id, from:(IDENTITY&&IDENTITY.number)||uid(), to:addr, body:m.body, ts:tsOf(m), folder:'sent', read:true }; }
  function replacePartition(folder, rows){
    DB.messages = DB.messages.filter(m=>m.folder!==folder).concat(rows);
    DB.messages.sort((a,b)=>a.ts-b.ts);
  }
  if(PERSONAL){
    // Cloud is the only source of truth for messages here — never let the local
    // cache seed the inbox (it would flash a phantom unread on boot before the
    // first cloud snapshot lands). Clear synchronously, before the first frame.
    DB.messages = [];
    window.addEventListener('message', e=>{
      if(e.origin !== location.origin) return;
      const d = e.data; if(!d || typeof d!=='object') return;
      if(d.type==='nopia:identity'){
        // Clear the message cache ONLY on a genuine account switch (uid changed).
        // The parent re-sends identity many times for the SAME account (hello reply,
        // onLoad, late number backfill); clearing on EVERY identity — with no
        // snapshot in the same tick — is what used to wipe INBOX/SENT and leave them
        // empty. Repeated same-account identity is now inert; the snapshots stay
        // authoritative via replacePartition. (And saveDB never persists messages in
        // PERSONAL, so loadDB() below can't reload a stale inbox anyway.)
        const switching = IDENTITY && IDENTITY.uid && IDENTITY.uid !== d.uid;
        IDENTITY = { uid:d.uid, number:d.number, username:d.username };
        try{ localStorage.setItem('ourcade:nokia:uid', d.uid||'guest'); }catch(_){}
        DB = loadDB();               // re-namespace local settings/snake to the real uid
        if(switching) DB.messages = [];
      } else if(d.type==='nopia:contacts'){
        SYNCED = (d.contacts||[]).filter(c=>c && c.number).map(c=>({ name:c.name||c.number, number:c.number }));
      } else if(d.type==='nopia:inbox'){
        replacePartition('inbox', (d.messages||[]).map(mapInbox));
      } else if(d.type==='nopia:sent'){
        replacePartition('sent', (d.messages||[]).map(mapSent));
      } else if(d.type==='nopia:incoming'){
        // Ring/toast ONLY — the message is already in DB.messages from the
        // nopia:inbox snapshot the parent posts in the same callback (pushing
        // again would duplicate it).
        if(d.message){
          if(audible()) playRingtone();
          showToast('NEW MESSAGE');
        }
      } else if(d.type==='nopia:incoming-ping'){
        if(audible()) playRingtone(); showToast('PING FROM '+(d.fromNumber||'?'));
      } else if(d.type==='nopia:sendresult'){
        showToast(d.error || (d.ok===false ? 'NOT DELIVERED' : 'SENT'));
      } else if(d.type==='nopia:reqresult'){
        if(d.error) showToast(d.error);
      }
    });
    postToParent({ type:'nopia:hello' });   // ask the parent for identity
  }

  /* ---------- boot ---------- */
  function boot(){
    layout();
    pushScreen(Standby);
    ensureYT();
    requestAnimationFrame(frame);
  }
  boot();
})();
</script>
</body>
</html>
